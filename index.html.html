<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="1; url=https://formatting-bill-hero-races.trycloudflare.com" />
    <title>XIAHUI Portfolio</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
        background: #0c0c0c;
        color: #d7e2ea;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        max-width: 720px;
        text-align: center;
      }

      h1 {
        margin-bottom: 16px;
        font-size: clamp(32px, 7vw, 72px);
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      p {
        margin-bottom: 28px;
        font-size: 18px;
        line-height: 1.7;
        opacity: 0.82;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border: 2px solid #d7e2ea;
        border-radius: 999px;
        padding: 12px 24px;
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-decoration: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>XIAHUI Portfolio</h1>
      <p>正在打开作品集公网链接。如果没有自动跳转，请点击下面按钮。</p>
